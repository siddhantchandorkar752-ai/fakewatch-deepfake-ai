project:
  name: FAKEWATCH
  version: 2.0
  seed: 42

data:
  root: datasets/
  image_size: 224
  num_frames: 16
  face_margin: 0.3
  batch_size: 16
  num_workers: 4
  datasets:
    - faceforensics
    - celebdf
    - dfdc

model:
  spatial:
    backbone: efficientnet_b4
    pretrained: true
    dropout: 0.3
  temporal:
    num_heads: 8
    num_layers: 4
    hidden_dim: 512
    dropout: 0.1
  fusion:
    hidden_dim: 256
    dropout: 0.2
  classifier:
    num_classes: 2

training:
  epochs: 50
  learning_rate: 0.0001
  weight_decay: 0.00001
  scheduler: cosine
  early_stopping_patience: 10
  checkpoint_dir: checkpoints/
  log_dir: logs/

inference:
  confidence_threshold: 0.5
  device: cuda
  onnx_export: true

deployment:
  host: 0.0.0.0
  port: 8000
  max_video_size_mb: 100
